<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <form action="" method="post">
      <div class="form-step form-step-1 active" id="form-step-1">
        <fieldset>
          <legend class="form-step-title">Create an Account</legend>
          <p class="form-step-description">
            Enter your name
          </p>
          <div class="form-groups">
            <div class="form-group">
              <input type="text" name="firstName" class="form-control" id="first-name" autocomplete="off" placeholder=" " maxlength="128" required aria-required="true" />
              <label for="first-name" class="form-label">First name</label>
            </div>
            <div class="form-group">
              <input type="text" name="lastName" class="form-control" id="last-name" autocomplete="off" placeholder=" " maxlength="128" required aria-required="true" />
              <label for="last-name" class="form-label">Last name (optional)</label>
            </div>
          </div>
        </fieldset>
      </div>

      <div class="form-step form-step-2" id="form-step-2">
        <fieldset>
          <legend class="form-step-title">Basic Information</legend>
          <p class="form-step-description">
            Enter your birthday and gender
          </p>
          <div class="form-groups">
            <fieldset class="form-birthday-fieldset">
              <legend class="sr-only">Birthday</legend>
              <div class="form-groups">
                <div class="form-group">
                  <select name="birthdayMonth" class="form-control" id="birthday-month" required aria-required="true">
                    <option value="" disabled selected></option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                  </select>
                  <label for="birthday-month" class="form-label">Month</label>
                  <span></span>
                </div>
                <div class="form-group">
                  <input type="text" class="form-control" placeholder=" " autocomplete="bday-day" maxlength="2" required aria-required="true" />
                  <label for="birthday-day" class="form-label">Day</label>
                </div>
                <div class="form-group">
                  <input type="text" class="form-control" placeholder=" " autocomplete="bday-year" minlength="4" maxlength="4" required aria-required="true" />
                  <label for="birthday-year" class="form-label">Year</label>
                </div>
              </div>
            </fieldset>
            <div class="form-group">
              <select name="gender" class="form-control" id="gender" required aria-required="true">
                <option value="" disabled selected></option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="nonBinary">Non-binary</option>
                <option value="ratherNot">Rather not say</option>
              </select>
              <label for="gender" class="form-label">Gender</label>
              <span></span>
            </div>
          </div>
        </fieldset>
      </div>

      <div class="form-step form-step-3" id="form-step-3">
        <fieldset>
          <legend class="form-step-title">Contact</legend>
          <p class="form-step-description">
            Enter your email address and phone number
          </p>
          <div class="form-groups">
            <div class="form-group invalid">
              <input type="email" name="email" class="form-control" id="email" autocomplete="email" placeholder=" " maxlength="48" required aria-required="true" aria-invalid="true" />
              <label for="email" class="form-label">Email address</label>
            </div>
            <fieldset class="form-phone-number-fieldset">
              <legend class="sr-only">Phone number</legend>
              <div class="form-groups">
                <div class="form-group">
                  <select name="telCountryCode" class="form-control" id="tel-country-code" required aria-required="true">
                    <option value="us" selected>+1 (US)</option>
                    <option value="za">+27 (ZA)</option>
                    <option value="gb">+44 (GB)</option>
                    <option value="mx">+52 (MX)</option>
                    <option value="br">+55 (BR)</option>
                    <option value="cn">+86 (CN)</option>
                    <option value="ae">+971 (AE)</option>
                  </select>
                  <label for="tel-country-code" class="form-label sr-only">Country code</label>
                  <span></span>
                </div>
                <div class="form-group">
                  <input type="text" name="telNational" class="form-control" id="tel-national" autocomplete="tel-national" placeholder=" " maxlength="16" required aria-required="true" />
                  <label for="tel-national" class="form-label">Phone Number</label>
                </div>
              </div>
            </fieldset>
          </div>
        </fieldset>
      </div>
      
      <div class="form-step form-step-4" id="form-step-4">
        <fieldset>
          <legend class="form-step-title">Address</legend>
          <p class="form-step-description">
            Enter your address
          </p>
          <div class="form-groups">
            <div class="form-group">
              <input type="text" name="addressLine1" class="form-control" id="address-line-1" autocomplete="address-line1" placeholder=" " maxlength="128" />
              <label for="address-line-1" class="form-label">Street name and number (optional)</label>
            </div>
            <div class="form-group">
              <input type="text" name="addressLine2" class="form-control" id="address-line-2" autocomplete="address-line2" placeholder=" " maxlength="128" />
              <label for="address-line-2" class="form-label">Apartment, suite, etc. (optional)</label>
            </div>
            <div class="form-group">
              <input type="text" name="addressLine3" class="form-control" id="address-line-3" autocomplete="address-line3" placeholder=" " maxlength="128" />
              <label for="address-line-3" class="form-label">Additional info (optional)</label>
            </div>
            <div class="form-group">
              <input type="text" name="addressLevel4" class="form-control" id="address-level-4" autocomplete="address-level4" placeholder=" " maxlength="128" />
              <label for="address-line-4" class="form-label">Neighborhood (optional)</label>
            </div>
            <div class="form-group">
              <input type="text" name="addressLevel3" class="form-control" id="address-level-3" autocomplete="address-level3" placeholder=" " maxlength="128" />
              <label for="address-level-3" class="form-label">District (optional)</label>
            </div>
            <div class="form-group">
              <input type="text" name="addressLevel2" class="form-control" id="address-level-2" autocomplete="address-level2" placeholder=" " maxlength="128" required aria-required="true" />
              <label for="address-level-2" class="form-label">City</label>
            </div>
            <div class="form-group">
              <input type="text" name="addressLevel1" class="form-control" id="address-level-1" autocomplete="address-level1" placeholder=" " maxlength="128" />
              <label for="address-level-1" class="form-label">State (optional)</label>
            </div>
            <div class="form-group">
              <input type="text" name="countryName" class="form-control" id="country-name" autocomplete="country-name" placeholder=" " maxlength="128" required aria-required="true" />
              <label for="country-name" class="form-label">Country</label>
            </div>
          </div>
        </fieldset>
      </div>

      <div class="form-step form-step-5" id="form-step-5">
        <fieldset>
          <legend class="form-step-title">Password</legend>
          <p class="form-step-description">
            Enter a password
          </p>
          <div class="form-groups">
            <div class="form-group">
              <input type="password" name="password" class="form-control" id="password" autocomplete="new-password" placeholder=" " minlength="10" maxlength="48" required aria-required="true" />
              <label for="password" class="form-label">Password</label>
              <button type="button" class="password-visibility-toggle" id="new-password-visibility-toggle" aria-label="Show password" aria-pressed="false" aria-controls="new-password">
                <svg class="view--off-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><defs><style>.cls-1{fill:none;}</style></defs><title>view--off</title><path d="M5.24,22.51l1.43-1.42A14.06,14.06,0,0,1,3.07,16C5.1,10.93,10.7,7,16,7a12.38,12.38,0,0,1,4,.72l1.55-1.56A14.72,14.72,0,0,0,16,5,16.69,16.69,0,0,0,1.06,15.66a1,1,0,0,0,0,.68A16,16,0,0,0,5.24,22.51Z"/><path d="M12,15.73a4,4,0,0,1,3.7-3.7l1.81-1.82a6,6,0,0,0-7.33,7.33Z"/><path d="M30.94,15.66A16.4,16.4,0,0,0,25.2,8.22L30,3.41,28.59,2,2,28.59,3.41,30l5.1-5.1A15.29,15.29,0,0,0,16,27,16.69,16.69,0,0,0,30.94,16.34,1,1,0,0,0,30.94,15.66ZM20,16a4,4,0,0,1-6,3.44L19.44,14A4,4,0,0,1,20,16Zm-4,9a13.05,13.05,0,0,1-6-1.58l2.54-2.54a6,6,0,0,0,8.35-8.35l2.87-2.87A14.54,14.54,0,0,1,28.93,16C26.9,21.07,21.3,25,16,25Z"/><rect id="_Transparent_Rectangle_" data-name="&lt;Transparent Rectangle&gt;" class="cls-1" width="32" height="32" /></svg>
                <svg class="view-icon hidden" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><defs><style>.cls-1{fill:none;}</style></defs><title>view</title><path d="M30.94,15.66A16.69,16.69,0,0,0,16,5,16.69,16.69,0,0,0,1.06,15.66a1,1,0,0,0,0,.68A16.69,16.69,0,0,0,16,27,16.69,16.69,0,0,0,30.94,16.34,1,1,0,0,0,30.94,15.66ZM16,25c-5.3,0-10.9-3.93-12.93-9C5.1,10.93,10.7,7,16,7s10.9,3.93,12.93,9C26.9,21.07,21.3,25,16,25Z" transform="translate(0 0)"/><path d="M16,10a6,6,0,1,0,6,6A6,6,0,0,0,16,10Zm0,10a4,4,0,1,1,4-4A4,4,0,0,1,16,20Z" transform="translate(0 0)"/><rect id="_Transparent_Rectangle_" data-name="&lt;Transparent Rectangle&gt;" class="cls-1" width="32" height="32" /></svg>
              </button>
            </div>
            <div class="form-group">
              <input type="password" name="confirmPassword" class="form-control" id="confirm-password" autocomplete="off" placeholder=" " minlength="10" maxlength="48" required aria-required="true" />
              <label for="confirm-password" class="form-label">Confirm Password</label>
              <button type="button" class="password-visibility-toggle" id="confirm-password-visibility-toggle" aria-label="Show password" aria-pressed="false" aria-controls="confirm-password">
                <svg class="view--off-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><defs><style>.cls-1{fill:none;}</style></defs><title>view--off</title><path d="M5.24,22.51l1.43-1.42A14.06,14.06,0,0,1,3.07,16C5.1,10.93,10.7,7,16,7a12.38,12.38,0,0,1,4,.72l1.55-1.56A14.72,14.72,0,0,0,16,5,16.69,16.69,0,0,0,1.06,15.66a1,1,0,0,0,0,.68A16,16,0,0,0,5.24,22.51Z"/><path d="M12,15.73a4,4,0,0,1,3.7-3.7l1.81-1.82a6,6,0,0,0-7.33,7.33Z"/><path d="M30.94,15.66A16.4,16.4,0,0,0,25.2,8.22L30,3.41,28.59,2,2,28.59,3.41,30l5.1-5.1A15.29,15.29,0,0,0,16,27,16.69,16.69,0,0,0,30.94,16.34,1,1,0,0,0,30.94,15.66ZM20,16a4,4,0,0,1-6,3.44L19.44,14A4,4,0,0,1,20,16Zm-4,9a13.05,13.05,0,0,1-6-1.58l2.54-2.54a6,6,0,0,0,8.35-8.35l2.87-2.87A14.54,14.54,0,0,1,28.93,16C26.9,21.07,21.3,25,16,25Z"/><rect id="_Transparent_Rectangle_" data-name="&lt;Transparent Rectangle&gt;" class="cls-1" width="32" height="32" /></svg>
                <svg class="view-icon hidden" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><defs><style>.cls-1{fill:none;}</style></defs><title>view</title><path d="M30.94,15.66A16.69,16.69,0,0,0,16,5,16.69,16.69,0,0,0,1.06,15.66a1,1,0,0,0,0,.68A16.69,16.69,0,0,0,16,27,16.69,16.69,0,0,0,30.94,16.34,1,1,0,0,0,30.94,15.66ZM16,25c-5.3,0-10.9-3.93-12.93-9C5.1,10.93,10.7,7,16,7s10.9,3.93,12.93,9C26.9,21.07,21.3,25,16,25Z" transform="translate(0 0)"/><path d="M16,10a6,6,0,1,0,6,6A6,6,0,0,0,16,10Zm0,10a4,4,0,1,1,4-4A4,4,0,0,1,16,20Z" transform="translate(0 0)"/><rect id="_Transparent_Rectangle_" data-name="&lt;Transparent Rectangle&gt;" class="cls-1" width="32" height="32" /></svg>
              </button>
            </div>
            <fieldset class="terms-and-conditions-fieldset">
              <legend class="sr-only">Do you agree to the terms?</legend>
              <div class="form-group">
                <input type="checkbox" name="termsAgreement" class="form-control" id="terms-agreement" />
                <label for="terms-agreement" class="form-label">By completing this form I agree to the <a href="#">terms and conditions</a> and <a href="#">privacy policy</a></label>
              </div>
            </fieldset>
          </div>
        </fieldset>
      </div>

      <button type="button" class="next-btn" id="next-btn">Next</button>
      <button type="submit" class="submit-btn hidden" id="submit-btn">Submit</button>
    </form>
  </main>

  <script src="script.js"></script>
</body>

</html>
